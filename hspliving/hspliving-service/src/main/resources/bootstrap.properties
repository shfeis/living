# 设置集群别名
spring.application.name=hspliving-service
# ָ指定nacos服务注册中心的地址
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
# 指定nacos服务注册中心的地址
spring.cloud.nacos.config.server-addr=127.0.0.1:8848
# ָ指定自动生成的命名空间编码
spring.cloud.nacos.config.namespace=af352b4d-9baf-4b26-84f7-957fae239f62
# ָ指定要查找的组
spring.cloud.nacos.config.group=dev
#ָ 指定dataId 和 是否实时更新
spring.cloud.nacos.config.ext-config[0].data-id=hspliving-service.yml
spring.cloud.nacos.config.ext-config[0].refresh=true
# 必须重新指定一下组，否则就会去读默认组：DEFAULT_GROUP
spring.cloud.nacos.config.ext-config[0].group=dev